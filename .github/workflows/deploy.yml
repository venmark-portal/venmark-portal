name: Deploy

on:
  push:
    branches: [main, staging]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Miljø at deploye til'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy produktion (main)
        if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KE }}
          script: |
            set -e
            cd /var/www/venmark
            git pull origin main
            if git diff HEAD@{1} --name-only | grep -q 'package\.json\|package-lock\.json'; then
              npm install --omit=dev
            fi
            set -a && source .env.local && set +a
            npx prisma generate
            npm run build
            pm2 restart venmark
            echo "✅ Produktion deployet"

      - name: Deploy test (staging)
        if: github.ref == 'refs/heads/staging' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KE }}
          script: |
            set -e
            cd /var/www/venmark-test
            git pull origin staging
            npm install --omit=dev
            set -a && source .env.local && set +a
            npx prisma generate
            npm run build
            pm2 restart venmark-test || pm2 start /var/www/venmark-test/ecosystem.config.js
            echo "✅ Test deployet"
